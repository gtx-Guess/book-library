services:
  frontend:
    build:
      context: ./frontend
      target: build
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"]

  backend:
    build:
      context: ./backend
      target: build
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: ["sh", "-c", "npm ci && npx prisma generate && npx prisma migrate deploy && npm run prisma:seed && npm run prisma:seed-dev && npm run dev"]

volumes:
  frontend_node_modules:
  backend_node_modules:
